<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PracDi Monetizable Card Builder</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#eef1f6; --text:#102542; --muted:#66758a;
      --border:#d8dee8; --primary:#3167e3;
      --header-grad:linear-gradient(135deg,#6d7cff,#8f5cff);
      --sponsor-grad:linear-gradient(90deg,#ffb347,#ffd86f);
    }
    *{box-sizing:border-box}
    body{ margin:0; padding:16px; background:var(--bg); font-family:Inter, sans-serif; color:var(--text); }
    
    /* Login Gate */
    #loginGate { 
      position: fixed; inset: 0; background: #fff; z-index: 10000; 
      display: flex; align-items: center; justify-content: center; flex-direction: column; 
    }
    .login-box { text-align:center; padding:40px; border-radius:24px; box-shadow:0 10px 30px rgba(0,0,0,0.1); border:1px solid #eee; }

    .wrap{ max-width:1200px; margin:0 auto; display:grid; grid-template-columns: 420px 1fr; gap:18px; }
    .panel, .preview-shell{ background:#fff; border-radius:24px; padding:18px; box-shadow:0 0 0 1px rgba(0,0,0,.04); }
    .section{ border-top:1px solid var(--border); padding-top:14px; margin-top:14px; }
    .label{ display:block; font-size:13px; color:var(--muted); margin-bottom:6px; }
    input, select, textarea{ width:100%; border:1px solid #ccd5e3; border-radius:12px; padding:10px; margin-bottom:10px; font-size:14px; }

    .btn{ border:none; border-radius:12px; padding:12px; cursor:pointer; font-weight:600; transition:0.2s; }
    .btn-primary{ background:var(--primary); color:#fff; width:100%; }
    .btn-light{ background:#eef2ff; color:var(--text); border:1px solid #bfd0ff; width:100%; }
    .btn-row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;}

    /* Preview Card */
    .preview-shell{ background:linear-gradient(135deg,#6d7cff,#8f5cff); min-height:800px; display:flex; flex-direction:column; align-items:center; }
    .card-preview{ width:100%; max-width:380px; background:#fff; border-radius:26px; overflow:hidden; position:relative; box-shadow:0 20px 40px rgba(0,0,0,0.2); }
    .card-page{ display:none; padding:20px; min-height:500px; }
    .card-page.active{ display:block; }

    .hero{ background:var(--header-grad); color:#fff; border-radius:20px; padding:18px; display:grid; grid-template-columns:90px 1fr; gap:15px; align-items:center; }
    .logo-box, .sponsor-logo{ width:80px; height:80px; border-radius:15px; background:#eee; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .logo-box img, .sponsor-logo img{ width:100%; height:100%; object-fit:cover; }

    /* Social Blocks */
    .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    .social-box { border-radius: 12px; padding: 12px; text-align: center; color: #fff; text-decoration: none; font-weight: 600; font-size: 13px; }
    .fb { background: #1877f2; } .ig { background: linear-gradient(45deg,#f58529,#dd2a7b,#8134af,#515bd4); } .web { background: #334155; }

    .quick-action{ background:var(--primary); color:#fff; padding:12px; border-radius:12px; text-decoration:none; display:block; text-align:center; font-weight:700; }
    .sponsor-box{ background:var(--sponsor-grad); border-radius:18px; padding:12px; display:grid; grid-template-columns:70px 1fr; gap:12px; align-items:center; margin-top:15px; text-decoration:none; color:#111; }

    .nav-arrows { display: flex; justify-content: space-between; padding: 15px 20px; background: #f8fafc; border-top: 1px solid #eee; }
    .arrow-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--primary); }

    .watermark{ text-align:center; padding:15px; color:#94a3b8; font-size:11px; font-weight:600; }

    @media (max-width: 900px){ .wrap{ grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div id="loginGate">
    <div class="login-box">
        <h2 style="margin-top:0;">PracDi Access</h2>
        <p style="color:var(--muted); font-size:14px;">Please enter your license key</p>
        <input type="password" id="passInput" placeholder="Enter Key (112344)" autofocus>
        <button class="btn btn-primary" id="loginBtn">Login to Builder</button>
    </div>
  </div>

  <div class="wrap" id="mainApp" style="display:none;">
    <div class="panel">
      <h1>Builder Panel</h1>
      
      <div class="section">
        <label class="label">Updates Remaining (Trial 5/5)</label>
        <input id="updatesLeft" type="text" value="5 / 5" readonly style="font-weight:bold; color:var(--primary);">
      </div>

      <div class="section">
        <h3>1. Branding</h3>
        <label class="label">Profile Photo / Logo</label>
        <input type="file" id="logoUpload" accept="image/*">
        <label class="label">Full Name</label>
        <input id="fullName" type="text" value="Malia Bonilla">
        <label class="label">Job Title</label>
        <input id="jobTitle" type="text" value="Digital Developer">
      </div>

      <div class="section">
        <h3>2. Primary Action</h3>
        <select id="actionType">
          <option value="call">📞 Call</option>
          <option value="email">✉️ Email</option>
          <option value="whatsapp">💬 WhatsApp</option>
          <option value="website">🌐 Website</option>
        </select>
        <input id="actionValue" type="text" value="+5999000000">
      </div>

      <div class="section">
        <h3>3. Sponsor Area</h3>
        <label class="label">Sponsor Image</label>
        <input type="file" id="sponsorUpload" accept="image/*">
        <input id="sponsorName" type="text" placeholder="Sponsor Name">
        <input id="sponsorLink" type="text" placeholder="Sponsor URL">
      </div>

      <div class="section">
        <h3>4. Flipbook / PDF (Page 3)</h3>
        <input id="flipbookUrl" type="text" placeholder="https://example.com/brochure.pdf">
      </div>

      <div class="section">
        <div class="btn-row">
          <button class="btn btn-light" onclick="applyChanges()">Preview</button>
          <button class="btn btn-light" onclick="resetForm()">Reset</button>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="publishCard()" style="background:#10b981;">Publish</button>
          <button class="btn btn-light" onclick="unlockEditMode()">Unlock Edit</button>
        </div>
      </div>
    </div>

    <div class="preview-shell">
      <div class="card-preview">
        <div class="card-page active" id="p1">
          <div class="hero">
            <div class="logo-box" id="pvLogoBox">Logo</div>
            <div>
              <h2 id="pvName" style="margin:0; font-size:22px;">Malia Bonilla</h2>
              <div id="pvJob" style="opacity:0.8; font-size:14px;">Developer</div>
            </div>
          </div>
          <div style="margin-top:25px; display:grid; grid-template-columns: 1fr 1fr; gap:15px; align-items:center;">
             <a href="#" id="pvPrimaryBtn" class="quick-action">Contact</a>
             <div style="display:flex; justify-content:center;"><div id="qrcode"></div></div>
          </div>
          <a href="#" id="pvSponsorAnchor" class="sponsor-box">
             <div class="sponsor-logo" id="pvSponsorLogo">Sponsor</div>
             <div><div id="pvSponsorName" style="font-weight:700; font-size:14px;">Sponsor</div></div>
          </a>
        </div>

        <div class="card-page" id="p2">
          <h3 style="text-align:center;">Social Links</h3>
          <div class="social-grid">
            <a href="#" id="pvFb" class="social-box fb" target="_blank">Facebook</a>
            <a href="#" id="pvIg" class="social-box ig" target="_blank">Instagram</a>
            <a href="#" id="pvWeb" class="social-box web" target="_blank" style="grid-column: span 2;">Website</a>
          </div>
        </div>

        <div class="card-page" id="p3">
          <h3 style="text-align:center;">Resources</h3>
          <div style="margin-top:40px; text-align:center; padding:20px; border:2px dashed #ddd; border-radius:20px;">
             <a href="#" id="pvFlipbookBtn" class="quick-action" target="_blank">View Flipbook/PDF</a>
          </div>
        </div>

        <div class="nav-arrows">
          <button class="arrow-btn" onclick="nav(-1)">❮</button>
          <div style="font-size:12px; color:#94a3b8; font-weight:700;" id="pageIndicator">1 / 3</div>
          <button class="arrow-btn" onclick="nav(1)">❯</button>
        </div>
        <div class="watermark">powered by PracDi Solutions</div>
      </div>
    </div>
  </div>

  <script>
    const PASSCODE = "112344";
    const loginGate = document.getElementById("loginGate");
    const mainApp = document.getElementById("mainApp");
    const passInput = document.getElementById("passInput");
    const loginBtn = document.getElementById("loginBtn");

    // LOGIN LOGIC
    function handleLogin() {
      if (passInput.value === PASSCODE) {
        loginGate.style.display = "none";
        mainApp.style.display = "grid";
        applyChanges();
      } else {
        alert("Incorrect License Key. Please try again.");
        passInput.value = "";
        passInput.focus();
      }
    }

    loginBtn.onclick = handleLogin;
    passInput.onkeypress = (e) => { if (e.key === "Enter") handleLogin(); };

    // APP LOGIC
    let currPage = 1;
    let updatesRemaining = 5;
    let isPublished = false;
    let logoData = "";
    let sponsorData = "";

    function nav(dir){
      currPage += dir;
      if(currPage < 1) currPage = 3;
      if(currPage > 3) currPage = 1;
      document.querySelectorAll(".card-page").forEach(p => p.classList.remove("active"));
      document.getElementById("p"+currPage).classList.add("active");
      document.getElementById("pageIndicator").textContent = `${currPage} / 3`;
    }

    // Photo Upload Listeners
    document.getElementById("logoUpload").onchange = function() {
      const reader = new FileReader();
      reader.onload = e => { logoData = e.target.result; applyChanges(); };
      reader.readAsDataURL(this.files[0]);
    };
    document.getElementById("sponsorUpload").onchange = function() {
      const reader = new FileReader();
      reader.onload = e => { sponsorData = e.target.result; applyChanges(); };
      reader.readAsDataURL(this.files[0]);
    };

    function applyChanges(){
      document.getElementById("pvName").textContent = document.getElementById("fullName").value;
      document.getElementById("pvJob").textContent = document.getElementById("jobTitle").value;
      
      const type = document.getElementById("actionType").value;
      const val = document.getElementById("actionValue").value;
      const btn = document.getElementById("pvPrimaryBtn");
      btn.textContent = type.toUpperCase();
      if(type === "call") btn.href = "tel:" + val;
      else if(type === "email") btn.href = "mailto:" + val;
      else if(type === "whatsapp") btn.href = "https://wa.me/" + val.replace(/\D/g,'');
      else btn.href = val;

      if(logoData) document.getElementById("pvLogoBox").innerHTML = `<img src="${logoData}">`;
      if(sponsorData) document.getElementById("pvSponsorLogo").innerHTML = `<img src="${sponsorData}">`;

      document.getElementById("pvSponsorName").textContent = document.getElementById("sponsorName").value || "Sponsor";
      document.getElementById("pvSponsorAnchor").href = document.getElementById("sponsorLink").value || "#";
      document.getElementById("pvFlipbookBtn").href = document.getElementById("flipbookUrl").value || "#";

      document.getElementById("qrcode").innerHTML = "";
      new QRCode(document.getElementById("qrcode"), { text: val, width: 70, height: 70 });
    }

    function publishCard(){
      if(isPublished) return alert("Card is locked. Unlock to edit.");
      if(updatesRemaining <= 0) return alert("No updates remaining. Upgrade to PracDi Pro.");
      
      applyChanges();
      updatesRemaining--;
      isPublished = true;
      document.getElementById("updatesLeft").value = `${updatesRemaining} / 5`;
      document.querySelectorAll(".panel input, .panel select").forEach(el => el.disabled = true);
      alert("✅ Card Published Successfully!");
    }

    function unlockEditMode(){
      if(updatesRemaining <= 0) return alert("Trial ended. Contact support for upgrade.");
      isPublished = false;
      document.querySelectorAll(".panel input, .panel select").forEach(el => el.disabled = false);
    }

    function resetForm(){ if(confirm("Reset Builder?")) window.location.reload(); }
  </script>
</body>
</html>
