<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Business Card | PracDi</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f3f4f6; --text:#1f2937; --muted:#6b7280; --primary:#3167e3;
      --header-grad:linear-gradient(135deg,#6d7cff,#8f5cff);
      --sponsor-grad:linear-gradient(90deg,#ffb347,#ffd86f);
    }
    *{box-sizing:border-box}
    body{ margin:0; font-family:Inter, sans-serif; background:var(--bg); display:flex; justify-content:center; align-items:center; min-height:100vh; overflow-x:hidden; }

    /* THE CARD (Visible to Everyone) */
    .card-container { width:100%; max-width:400px; height:700px; background:#fff; border-radius:30px; box-shadow:0 20px 50px rgba(0,0,0,0.1); position:relative; overflow:hidden; display:flex; flex-direction:column; margin:20px; }
    .card-page { display:none; padding:25px; flex-grow:1; }
    .card-page.active { display:block; }

    .hero-sec{ background:var(--header-grad); color:#fff; border-radius:24px; padding:20px; display:grid; grid-template-columns:80px 1fr; gap:15px; align-items:center; margin-bottom:20px; }
    .logo-frame{ width:80px; height:80px; border-radius:18px; background:rgba(255,255,255,0.2); overflow:hidden; display:flex; align-items:center; justify-content:center; }
    .logo-frame img{ width:100%; height:100%; object-fit:cover; }

    .action-btn{ background:var(--primary); color:#fff; padding:15px; border-radius:15px; text-decoration:none; display:block; text-align:center; font-weight:700; font-size:16px; margin-top:10px;}
    .sponsor-box{ background:var(--sponsor-grad); border-radius:20px; padding:15px; display:grid; grid-template-columns:60px 1fr; gap:15px; align-items:center; margin-top:30px; text-decoration:none; color:#000; }
    .sponsor-img{ width:60px; height:60px; border-radius:12px; background:#fff; overflow:hidden; }
    .sponsor-img img{ width:100%; height:100%; object-fit:cover; }

    .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
    .social-btn { border-radius: 12px; padding: 15px; text-align: center; color: #fff; text-decoration: none; font-weight: 600; font-size: 14px; }
    .fb { background: #1877f2; } .ig { background: linear-gradient(45deg,#f58529,#dd2a7b,#8134af,#515bd4); } .web { background: #334155; }

    .nav-bar { display: flex; justify-content: space-between; align-items:center; padding: 15px 30px; background: #fafafa; border-top: 1px solid #eee; }
    .arrow { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--primary); }
    .watermark { text-align: center; font-size: 11px; color: #9ca3af; padding-bottom: 10px; font-weight: bold; }

    /* THE BUILDER PANEL (Hidden until Login) */
    #builderOverlay { position:fixed; inset:0; background:rgba(255,255,255,0.98); z-index:9999; padding:20px; display:none; overflow-y:auto; }
    .builder-content { max-width:500px; margin:0 auto; background:#fff; padding:25px; border-radius:24px; box-shadow:0 10px 40px rgba(0,0,0,0.1); }
    input, select { width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:10px; }
    .close-builder { float:right; cursor:pointer; font-weight:bold; color:red; }

    /* Login Button Overlay */
    .admin-login-btn { position:fixed; bottom:20px; right:20px; background:rgba(0,0,0,0.1); color:#666; border:none; padding:8px 12px; border-radius:20px; font-size:11px; cursor:pointer; }
  </style>
</head>
<body>

  <div class="card-container">
    <div class="card-page active" id="p1">
      <div class="hero-sec">
        <div class="logo-frame" id="pvLogoBox">M</div>
        <div>
          <h2 id="pvName" style="margin:0; font-size:22px;">Malia Bonilla</h2>
          <div id="pvJob" style="opacity:0.9; font-size:14px;">Product Developer</div>
        </div>
      </div>

      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; align-items:center;">
        <a href="tel:+5999000000" id="pvActionBtn" class="action-btn">CALL ME</a>
        <div id="qrcode" style="display:flex; justify-content:center;"></div>
      </div>

      <a href="#" id="pvSponsorLink" class="sponsor-box">
        <div class="sponsor-img" id="pvSponsorLogo"></div>
        <div>
          <div id="pvSponsorName" style="font-weight:800; font-size:14px;">Your Sponsor Here</div>
          <div style="font-size:11px; opacity:0.7;">Click to visit website</div>
        </div>
      </a>
    </div>

    <div class="card-page" id="p2">
      <h3 style="text-align:center;">Connect with Me</h3>
      <div class="social-grid">
        <a href="#" class="social-btn fb">Facebook</a>
        <a href="#" class="social-btn ig">Instagram</a>
        <a href="#" class="social-btn web" style="grid-column: span 2;">Personal Website</a>
      </div>
    </div>

    <div class="card-page" id="p3">
      <h3 style="text-align:center;">Digital Catalog</h3>
      <div style="margin-top:50px; text-align:center; padding:30px; border:2px dashed #ccc; border-radius:20px;">
        <a href="#" id="pvFlipbook" class="action-btn" target="_blank">OPEN BROCHURE</a>
      </div>
    </div>

    <div class="nav-bar">
      <button class="arrow" onclick="nav(-1)">❮</button>
      <div id="pageDots" style="font-size:12px; font-weight:700; color:var(--muted);">1 / 3</div>
      <button class="arrow" onclick="nav(1)">❯</button>
    </div>
    <div class="watermark">powered by PracDi Solutions</div>
  </div>

  <button class="admin-login-btn" onclick="askForCode()">Login (Members Only)</button>

  <div id="builderOverlay">
    <div class="builder-content">
      <span class="close-builder" onclick="document.getElementById('builderOverlay').style.display='none'">✕ Close</span>
      <h2>PracDi Builder</h2>
      <p id="trialCounter" style="color:var(--primary); font-weight:700;">Remaining Trials: 5/5</p>
      
      <label>Full Name</label>
      <input type="text" id="editName" value="Malia Bonilla" oninput="liveUpdate()">
      
      <label>Upload Photo</label>
      <input type="file" id="editPhoto" accept="image/*">

      <label>Primary Action</label>
      <select id="editType" onchange="liveUpdate()">
        <option value="call">Call Me</option>
        <option value="whatsapp">WhatsApp</option>
        <option value="email">Email</option>
      </select>
      <input type="text" id="editVal" value="+5999000000" oninput="liveUpdate()">

      <label>Sponsor Name & Link</label>
      <input type="text" id="editSponsorName" placeholder="Sponsor Name" oninput="liveUpdate()">
      <input type="text" id="editSponsorLink" placeholder="Sponsor URL" oninput="liveUpdate()">
      <input type="file" id="editSponsorPhoto" accept="image/*">

      <button class="action-btn" onclick="publish()" style="width:100%; border:none; cursor:pointer;">PUBLISH & LOCK</button>
      <button onclick="unlock()" style="width:100%; margin-top:10px; border:none; background:#eee; padding:10px; border-radius:10px;">Unlock to Edit</button>
    </div>
  </div>

  <script>
    let currentP = 1;
    let updates = 5;
    let locked = false;

    // Navigation
    function nav(d) {
      currentP += d;
      if(currentP < 1) currentP = 3;
      if(currentP > 3) currentP = 1;
      document.querySelectorAll('.card-page').forEach(p => p.classList.remove('active'));
      document.getElementById('p'+currentP).classList.add('active');
      document.getElementById('pageDots').innerText = currentP + " / 3";
    }

    // Login logic
    function askForCode() {
      let code = prompt("Enter Member Passcode:");
      if (code === "112344") {
        document.getElementById('builderOverlay').style.display = 'block';
      } else if (code !== null) {
        alert("Access Denied.");
      }
    }

    // Real-time Preview Logic
    function liveUpdate() {
      if(locked) return;
      document.getElementById('pvName').innerText = document.getElementById('editName').value;
      const type = document.getElementById('editType').value;
      const val = document.getElementById('editVal').value;
      const btn = document.getElementById('pvActionBtn');
      
      btn.innerText = type.toUpperCase() + " ME";
      if(type === 'call') btn.href = "tel:" + val;
      if(type === 'whatsapp') btn.href = "https://wa.me/" + val.replace(/\D/g,'');

      document.getElementById('pvSponsorName').innerText = document.getElementById('editSponsorName').value || "Sponsor";
      
      // Update QR
      document.getElementById("qrcode").innerHTML = "";
      new QRCode(document.getElementById("qrcode"), { text: val, width: 80, height: 80 });
    }

    // Image Uploads
    document.getElementById('editPhoto').onchange = function(e) {
      let r = new FileReader();
      r.onload = function() { document.getElementById('pvLogoBox').innerHTML = `<img src="${r.result}">`; }
      r.readAsDataURL(e.target.files[0]);
    };
    document.getElementById('editSponsorPhoto').onchange = function(e) {
      let r = new FileReader();
      r.onload = function() { document.getElementById('pvSponsorLogo').innerHTML = `<img src="${r.result}">`; }
      r.readAsDataURL(e.target.files[0]);
    };

    function publish() {
      if(updates <= 0) return alert("Trials finished! Contact PracDi for more.");
      locked = true;
      updates--;
      document.getElementById('trialCounter').innerText = "Remaining Trials: " + updates + "/5";
      alert("Card Published and Locked!");
      document.getElementById('builderOverlay').style.display = 'none';
    }

    function unlock() {
      if(updates <= 0) return alert("Please upgrade to unlock.");
      locked = false;
      alert("Editor Unlocked.");
    }

    // Initial QR load
    window.onload = () => { liveUpdate(); };
  </script>
</body>
</html>
