<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PracDi Monetizable Card Builder</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@400;600;700&family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#eef1f6;
      --card:#ffffff;
      --text:#102542;
      --muted:#66758a;
      --border:#d8dee8;
      --primary:#3167e3;
      --primary-dark:#244fb8;
      --soft:#eef3ff;
      --header-grad:linear-gradient(135deg,#6d7cff,#8f5cff);
      --sponsor-grad:linear-gradient(90deg,#ffb347,#ffd86f);
      --preview-bg:linear-gradient(135deg,#6d7cff,#8f5cff);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      padding:16px;
      background:var(--bg);
      font-family:Inter, Arial, sans-serif;
      color:var(--text);
    }
    .wrap{
      max-width:1200px;
      margin:0 auto;
      display:grid;
      grid-template-columns: 420px 1fr;
      gap:18px;
    }
    .panel, .preview-shell{
      background:#fff;
      border-radius:24px;
      padding:18px;
      box-shadow:0 0 0 1px rgba(0,0,0,.04);
    }
    h1,h2,h3{ margin:0 0 12px 0; }
    .panel h1{ font-size:26px; }
    .sub{ color:var(--muted); font-size:14px; margin-bottom:14px; }
    .section{ border-top:1px solid var(--border); padding-top:14px; margin-top:14px; }
    .label{ display:block; font-size:13px; color:var(--muted); margin-bottom:6px; }
    
    input, select, textarea{
      width:100%;
      border:1px solid #ccd5e3;
      border-radius:14px;
      padding:12px 14px;
      font-size:14px;
      background:#fff;
      margin-bottom:10px;
    }
    input:disabled, select:disabled, textarea:disabled {
      background: #f5f7fa;
      cursor: not-allowed;
      opacity: 0.7;
    }
    
    .grid-2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .btn{ border:none; border-radius:14px; padding:12px 14px; cursor:pointer; font-size:15px; font-weight:600; transition: 0.2s; }
    .btn-primary{ background:var(--primary); color:#fff; }
    .btn-primary:hover{ background:var(--primary-dark); }
    .btn-light{ background:#eef2ff; color:var(--text); border:1px solid #bfd0ff; }
    .btn-row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }

    /* Preview Styles */
    .preview-shell{ background:var(--preview-bg); min-height:760px; }
    .preview-topbar{ color:#fff; font-size:12px; text-align:center; margin-bottom:12px; opacity:.95; }
    .card-preview{ max-width:420px; margin:0 auto; background:#fff; border-radius:26px; overflow:hidden; box-shadow:0 16px 28px rgba(0,0,0,.18); }
    .card-page{ display:none; padding:18px; }
    .card-page.active{ display:block; }

    .hero{ background:var(--header-grad); color:#fff; border-radius:20px; padding:18px; display:grid; grid-template-columns:110px 1fr; gap:14px; align-items:center; }
    .logo-box{ width:110px; height:110px; border-radius:22px; background:#f3f3f3; display:flex; align-items:center; justify-content:center; overflow:hidden; color:#444; font-size:13px; text-align:center; }
    .logo-box img{ width:100%; height:100%; object-fit:cover; }
    .title-box h2{ margin:0 0 6px 0; font-size:30px; line-height:1.02; }

    /* New Social Boxes */
    .social-box{ border-radius:14px; padding:12px; text-align:center; color:#fff; font-weight:600; text-decoration: none; display: block; font-size: 14px; }
    .fb { background:#1877f2; }
    .ig { background:linear-gradient(45deg,#f58529,#dd2a7b,#8134af,#515bd4); }
    .web { background:#334155; }

    .quick-grid{ margin-top:14px; display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .quick-box{ background:#fff; border:1px solid var(--border); border-radius:18px; min-height:96px; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:10px; text-align:center; }
    .quick-action{ text-decoration:none; background:var(--primary); color:#fff; padding:10px 14px; border-radius:12px; display:inline-block; font-weight:600; }
    
    .qr-box{ width:80px; height:80px; }

    .sponsor-box{ margin-top:14px; border-radius:16px; background:var(--sponsor-grad); min-height:74px; display:grid; grid-template-columns:80px 1fr; gap:10px; align-items:center; padding:10px 12px; color:#111; }
    .sponsor-logo{ width:68px; height:68px; background:#fff; border-radius:14px; overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:11px; }
    .sponsor-logo img{ width:100%; height:100%; object-fit:cover; }

    .nav{ display:flex; gap:10px; justify-content:center; padding:14px 0 4px 0; }
    .nav button{ border:none; border-radius:999px; padding:8px 12px; cursor:pointer; background:#eef2ff; color:var(--text); }

    .info-list{ display:grid; gap:10px; }
    .info-item{ border:1px solid var(--border); border-radius:16px; padding:12px 14px; background:#fbfcff; }
    .info-item b{ display:block; margin-bottom:4px; font-size: 12px; color: var(--muted); text-transform: uppercase; }

    .watermark{ text-align:center; color:#7a7a7a; font-size:12px; margin-top:14px; }

    @media (max-width: 980px){
      .wrap{ grid-template-columns:1fr; }
      .panel{ order:2; }
      .preview-shell{ order:1; }
    }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="panel">
      <h1>Card Builder</h1>
      <div class="sub">Updates deduct from your balance only when you <b>Publish</b>.</div>

      <div class="section">
        <label class="label">Updates Remaining</label>
        <input id="updatesLeft" type="text" value="5 / 5" readonly style="font-weight:bold; color:var(--primary);" />
      </div>

      <div class="section">
        <h3>Design</h3>
        <div class="grid-2">
          <div>
            <label class="label">Theme</label>
            <select id="themeSelect" onchange="applyChanges()">
              <option value="violet">Violet Blue</option>
              <option value="green">Green Dark</option>
              <option value="sunset">Sunset Orange</option>
              <option value="gold">Black Gold</option>
              <option value="clean">Clean Blue</option>
            </select>
          </div>
          <div>
            <label class="label">Font</label>
            <select id="fontSelect" onchange="applyChanges()">
              <option value="inter">Inter</option>
              <option value="poppins">Poppins</option>
              <option value="montserrat">Montserrat</option>
            </select>
          </div>
        </div>
      </div>

      <div class="section">
        <h3>Content</h3>
        <label class="label">Full Name</label>
        <input id="fullName" type="text" value="Malia Bonilla" />
        <label class="label">Job Title</label>
        <input id="jobTitle" type="text" value="Product Developer" />
        
        <div class="grid-2">
          <div>
            <label class="label">Email</label>
            <input id="email" type="email" value="hello@pracdi.com" />
          </div>
          <div>
            <label class="label">Phone</label>
            <input id="phone" type="text" value="+5999000000" />
          </div>
        </div>
        
        <label class="label">Website URL</label>
        <input id="website" type="text" value="https://pracdi.com" />
        <label class="label">Facebook URL</label>
        <input id="facebook" type="text" value="#" />
        <label class="label">Instagram URL</label>
        <input id="instagram" type="text" value="#" />
      </div>

      <div class="section">
        <h3>Publishing</h3>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="applyChanges()">Preview</button>
          <button class="btn btn-light" onclick="resetForm()">Reset</button>
        </div>
        <div class="btn-row" style="margin-top:10px;">
          <button class="btn btn-primary" onclick="publishCard()" style="background:#10b981;">Publish Now</button>
          <button class="btn btn-light" onclick="unlockEditMode()">Unlock Edit</button>
        </div>
      </div>
    </div>

    <div class="preview-shell" id="previewShell">
      <div class="preview-topbar">Live Preview</div>

      <div class="card-preview" id="cardPreview">
        <div class="card-page active" id="page1">
          <div class="hero">
            <div class="logo-box" id="logoBox">Logo</div>
            <div class="title-box">
              <h2 id="pvName">Your Name</h2>
              <div id="pvJob" style="opacity:0.9">Job Title</div>
            </div>
          </div>

          <div class="quick-grid">
            <div class="quick-box">
              <span style="font-size:11px; color:var(--muted); margin-bottom:5px;">Primary</span>
              <a href="#" id="primaryActionBtn" class="quick-action">Contact</a>
            </div>
            <div class="quick-box">
              <div id="qrcode"></div>
            </div>
          </div>

          <div class="sponsor-box" id="sponsorBox">
            <div class="sponsor-logo">Sponsor</div>
            <div class="sponsor-text">Your Sponsor Here</div>
          </div>
          <div class="watermark" id="watermark">Powered by PracDi</div>
        </div>

        <div class="card-page" id="page2">
          <h3 style="text-align:center">Contact & Social</h3>
          <div class="info-list">
            <div class="info-item">
              <b>Links</b>
              <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:8px;">
                <a id="fbLink" class="social-box fb" target="_blank">Facebook</a>
                <a id="igLink" class="social-box ig" target="_blank">Instagram</a>
                <a id="webLink" class="social-box web" target="_blank" style="grid-column:span 2;">Website</a>
              </div>
            </div>
            <div class="info-item"><b>Email</b><span id="infoEmail"></span></div>
            <div class="info-item"><b>Phone</b><span id="infoPhone"></span></div>
          </div>
        </div>

        <div class="nav">
          <button onclick="showPage(1)">Home</button>
          <button onclick="showPage(2)">Social</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let isPublished = false;
    let maxUpdates = 5;
    let updatesRemaining = 5;
    let qr = null;

    const themes = {
      violet: { previewBg: "linear-gradient(135deg,#6d7cff,#8f5cff)", heroGrad: "linear-gradient(135deg,#6d7cff,#8f5cff)", sponsorGrad: "linear-gradient(90deg,#ffb347,#ffd86f)" },
      green: { previewBg: "linear-gradient(135deg,#10b981,#0f172a)", heroGrad: "linear-gradient(135deg,#10b981,#0f172a)", sponsorGrad: "linear-gradient(90deg,#bbf7d0,#86efac)" },
      sunset: { previewBg: "linear-gradient(135deg,#ff7eb3,#ffd166)", heroGrad: "linear-gradient(135deg,#ff7eb3,#ffd166)", sponsorGrad: "linear-gradient(90deg,#f59e0b,#fde68a)" },
      gold: { previewBg: "linear-gradient(135deg,#111111,#d4af37)", heroGrad: "linear-gradient(135deg,#111111,#d4af37)", sponsorGrad: "linear-gradient(90deg,#9a6c00,#f7d76a)" },
      clean: { previewBg: "linear-gradient(135deg,#dbeafe,#93c5fd)", heroGrad: "linear-gradient(135deg,#2563eb,#60a5fa)", sponsorGrad: "linear-gradient(90deg,#dbeafe,#bfdbfe)" }
    };

    const fonts = {
      inter: "Inter, sans-serif",
      poppins: "Poppins, sans-serif",
      montserrat: "Montserrat, sans-serif"
    };

    function showPage(n){
      document.querySelectorAll(".card-page").forEach(p => p.classList.remove("active"));
      document.getElementById("page" + n).classList.add("active");
    }

    function refreshUpdatesDisplay(){
      document.getElementById("updatesLeft").value = `${updatesRemaining} / ${maxUpdates}`;
    }

    function setEditMode(enabled){
      document.querySelectorAll("input, select, textarea").forEach(el => {
        if(el.id !== "updatesLeft") el.disabled = !enabled;
      });
    }

    function showPublishBanner(message, color = "#10b981"){
      let banner = document.getElementById("publishBanner") || document.createElement("div");
      banner.id = "publishBanner";
      banner.style.cssText = `position:fixed; top:20px; left:50%; transform:translateX(-50%); background:${color}; color:white; padding:12px 24px; border-radius:50px; z-index:9999; font-weight:600; box-shadow:0 10px 20px rgba(0,0,0,0.2);`;
      banner.textContent = message;
      if(!document.getElementById("publishBanner")) document.body.appendChild(banner);
      setTimeout(() => banner.remove(), 4000);
    }

    function applyChanges(){
      const theme = document.getElementById("themeSelect").value;
      const font = document.getElementById("fontSelect").value;
      const name = document.getElementById("fullName").value;
      const job = document.getElementById("jobTitle").value;
      const website = document.getElementById("website").value;
      const email = document.getElementById("email").value;
      const phone = document.getElementById("phone").value;

      // Update Preview Styles
      document.getElementById("cardPreview").style.fontFamily = fonts[font];
      document.getElementById("previewShell").style.background = themes[theme].previewBg;
      document.querySelector(".hero").style.background = themes[theme].heroGrad;
      document.getElementById("sponsorBox").style.background = themes[theme].sponsorGrad;

      // Update Text
      document.getElementById("pvName").textContent = name;
      document.getElementById("pvJob").textContent = job;
      document.getElementById("infoEmail").textContent = email;
      document.getElementById("infoPhone").textContent = phone;

      // Update Social Boxes
      document.getElementById("fbLink").href = document.getElementById("facebook").value || "#";
      document.getElementById("igLink").href = document.getElementById("instagram").value || "#";
      document.getElementById("webLink").href = website || "#";

      // QR Code
      const qrBox = document.getElementById("qrcode");
      qrBox.innerHTML = "";
      new QRCode(qrBox, { text: website || window.location.href, width: 80, height: 80 });
    }

    function publishCard(){
      if(isPublished) { alert("Already published and locked."); return; }
      if(updatesRemaining <= 0) { alert("No updates left!"); return; }

      applyChanges();
      updatesRemaining--;
      isPublished = true;
      refreshUpdatesDisplay();
      setEditMode(false);
      showPublishBanner(`✅ Card Published! (${updatesRemaining} updates left)`);
    }

    function unlockEditMode(){
      if(updatesRemaining <= 0) { alert("Cannot unlock. 0 updates left."); return; }
      isPublished = false;
      setEditMode(true);
      showPublishBanner("✏️ Edit Mode Enabled", "#3167e3");
    }

    function resetForm(){ if(confirm("Reset everything?")) window.location.reload(); }

    // Init
    refreshUpdatesDisplay();
    applyChanges();
  </script>
</body>
</html>
